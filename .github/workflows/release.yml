name: Publish tagged release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag to release
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python tools/build_release.py
      - run: python tools/validate_world.py
      - run: python tools/verify_release.py dist/Backrooms_Java_1.21.5_v0.5.2_Integrated.zip
      - run: python tools/generate_checksums.py
      - name: Refuse to overwrite an existing release
        env: {GH_TOKEN: '${{ github.token }}'}
        run: |
          case "$RELEASE_TAG" in v*) ;; *) echo "A v* tag is required." >&2; exit 1 ;; esac
          if gh release view "$RELEASE_TAG"; then
            echo "Release already exists; refusing to overwrite." >&2
            exit 1
          fi
      - name: Create release
        env: {GH_TOKEN: '${{ github.token }}'}
        run: |
          gh release create "$RELEASE_TAG" \
            dist/Backrooms_Java_1.21.5_v0.5.2_Integrated.zip \
            dist/SHA256SUMS.txt \
            --verify-tag \
            --title "Backrooms Cinematic $RELEASE_TAG — Integrated HD Edition" \
            --notes-file docs/RELEASE_NOTES_v0.5.2.md
