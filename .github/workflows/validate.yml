name: Validate build

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build and validate
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" == *-rc* ]]; then
            python tools/build_release.py --allow-version-mismatch
            python tools/validate_world.py dist/Backrooms_Java_1.21.5_v0.5.2_Integrated.zip --allow-version-mismatch
            python tools/verify_release.py dist/Backrooms_Java_1.21.5_v0.5.2_Integrated.zip --allow-version-mismatch
          else
            python tools/build_release.py
            python tools/validate_world.py
            python tools/verify_release.py dist/Backrooms_Java_1.21.5_v0.5.2_Integrated.zip
          fi
      - run: python tools/generate_checksums.py
      - uses: actions/upload-artifact@v4
        with:
          name: Backrooms_Java_1.21.5_v0.5.2_Integrated
          path: |
            dist/Backrooms_Java_1.21.5_v0.5.2_Integrated.zip
            dist/SHA256SUMS.txt
